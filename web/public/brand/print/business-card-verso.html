<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<title>Niqo Services — Carte de visite (verso)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
  @page { size: 91mm 61mm; margin: 0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:91mm; height:61mm; }
  .card { position:relative; width:91mm; height:61mm; background:#F8FAFC; overflow:hidden;
    -webkit-print-color-adjust:exact; print-color-adjust:exact; display:flex; flex-direction:column;
    align-items:center; justify-content:center; }
  .seal { width:24mm; height:24mm; }
  .hair { width:30mm; height:1.5px; background:#A16207; margin:5mm 0 3mm; }
  .url { font-family:'Inter',sans-serif; font-weight:500; font-size:9pt; letter-spacing:0.28em;
    padding-left:0.28em; color:#0F172A; }
</style></head>
<body>
  <div class="card">
    <img class="seal" src="../logos/niqo-services-emblem.png" alt="Niqo Services" style="border-radius:3mm" />
    <div class="hair"></div>
    <div class="url">NIQO.SERVICES</div>
  </div>
</body></html>
